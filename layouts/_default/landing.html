{{ define "main" }}
  <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 sm:py-24">
    <div class="max-w-3xl">
      <h1 class="text-3xl sm:text-4xl font-bold text-slate-900 dark:text-white">{{ .Title }}</h1>
      <p class="mt-4 text-lg text-slate-600 dark:text-slate-400">{{ .Description }}</p>
      {{ with .Params.github }}
        <div class="mt-6">
          <a href="{{ . }}" class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" target="_blank" rel="noopener">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
            View on GitHub
          </a>
        </div>
      {{ end }}
    </div>
    {{ if .Content }}
      <div class="mt-12 max-w-3xl prose dark:prose-invert prose-slate" id="landing-content">
        {{ .Content }}
      </div>
      <script>
      (function() {
        var blocks = document.querySelectorAll('#landing-content .highlight');
        blocks.forEach(function(block) {
          var pre = block.querySelector('pre');
          if (!pre) return;
          var code = pre.querySelector('code');
          var text = (code || pre).textContent.trim();
          // Only add copy button to short install-style blocks
          if (text.split('\n').length > 2) return;
          block.style.position = 'relative';
          var btn = document.createElement('button');
          btn.className = 'copy-btn';
          btn.setAttribute('aria-label', 'Copy to clipboard');
          btn.innerHTML = '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
          btn.addEventListener('click', function() {
            navigator.clipboard.writeText(text).then(function() {
              btn.innerHTML = '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>';
              setTimeout(function() {
                btn.innerHTML = '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
              }, 2000);
            });
          });
          block.appendChild(btn);
        });
      })();
      </script>
    {{ end }}
    {{ if .Sections }}
      <div class="mt-12">
        {{ range .Sections }}
          <a href="{{ .RelPermalink }}" class="inline-flex items-center gap-2 px-6 py-3 bg-accent-500 hover:bg-accent-600 text-white font-medium rounded-lg transition-colors">
            Read the Docs
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
          </a>
        {{ end }}
      </div>
    {{ end }}
  </section>
{{ end }}
